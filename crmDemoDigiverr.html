<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digiverr – Digital Products Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .dv-header { border-bottom: 1px solid #e5e7eb; }
    .dv-nav-active { border-bottom: 3px solid #1DBF73; }
    .dv-category-pill { transition: all 0.2s; }
    .dv-category-pill:hover { background: #1DBF73; color: white; transform: scale(1.05); }
    #dv-tester { position: fixed; bottom: 20px; right: 20px; width: 360px; background: white; border: 3px solid #1DBF73; border-radius: 16px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); z-index: 99999; display: none; }
    .dv-avatar { border: 3px solid #1DBF73; }
  </style>
</head>
<body class="bg-gray-50">

<!-- HEADER -->
<header class="dv-header bg-white sticky top-0 z-50" data-dv-component="header">
  <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <!-- Logo -->
      <div class="flex items-center gap-2 text-3xl font-bold text-[#1DBF73]" data-dv-component="logo">
        <i class="fa-solid fa-bolt"></i> Digiverr
      </div>

      <!-- Search -->
      <div class="relative w-96">
        <input type="text" id="search-input" placeholder="What digital product are you looking for?" 
               class="w-full border border-gray-300 rounded-full py-3 px-6 pl-12 focus:outline-none focus:border-[#1DBF73]">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-gray-400"></i>
      </div>
    </div>

    <div class="flex items-center gap-6 text-sm font-medium">
      <a href="#" class="hover:text-[#1DBF73]">Business</a>
      <a href="#" onclick="showPostGigModal()" class="bg-[#1DBF73] text-white px-6 py-2.5 rounded-full hover:bg-green-600">Post a Gig</a>
      <div class="flex items-center gap-2 cursor-pointer">
        <img src="https://i.pravatar.cc/32?u=nathaniel" class="w-8 h-8 rounded-full dv-avatar" alt="Nathaniel">
        <span class="font-medium">Nathaniel</span>
      </div>
    </div>
  </div>

  <!-- NEW SECONDARY NAV – YOUR 11 CATEGORIES -->
  <div class="border-t bg-white py-3 overflow-x-auto">
    <div class="max-w-7xl mx-auto px-8 flex gap-4 whitespace-nowrap" id="category-nav">
      <!-- Populated by JS -->
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="max-w-7xl mx-auto px-8 py-8">
  <!-- Gig Grid -->
  <div id="gig-grid" class="grid grid-cols-5 gap-6" data-dv-component="gig-grid"></div>

  <!-- Forum Section -->
  <div class="mt-20" data-dv-component="forum-section">
    <h2 class="text-3xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-comments"></i> Community Forum</h2>
    <div id="forum-threads" class="space-y-6"></div>
  </div>
</main>

<!-- POST GIG MODAL with FLUX -->
<div id="post-gig-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
  <div class="bg-white rounded-3xl w-full max-w-2xl p-8">
    <h3 class="text-2xl font-bold mb-6">Post Your Digital Product</h3>
    
    <input id="gig-title" placeholder="Gig title" class="w-full border p-4 rounded-2xl mb-4">
    <textarea id="gig-desc" placeholder="Description" class="w-full border p-4 rounded-2xl h-32 mb-4"></textarea>
    
    <!-- FLUX BUTTON -->
    <div class="mb-6">
      <button onclick="generateWithFlux()" 
              class="w-full bg-gradient-to-r from-purple-600 to-violet-600 text-white py-6 rounded-3xl text-lg font-bold flex items-center justify-center gap-3 hover:scale-105">
        <i class="fa-solid fa-bolt"></i> GENERATE COVER IMAGE WITH NVIDIA FLUX
      </button>
      <p class="text-xs text-center text-gray-500 mt-2">Type a prompt below and click → instant photorealistic preview</p>
      <input id="flux-prompt" placeholder="e.g. cyberpunk ebook cover, neon city" class="w-full mt-3 border p-4 rounded-2xl">
    </div>

    <img id="flux-preview" src="https://picsum.photos/id/1015/600/400" class="w-full rounded-2xl mb-6 hidden">
    
    <div class="flex gap-4">
      <button onclick="hidePostGigModal()" class="flex-1 py-4 border rounded-2xl">Cancel</button>
      <button onclick="postGig()" class="flex-1 py-4 bg-[#1DBF73] text-white rounded-2xl font-bold">Post Gig Now</button>
    </div>
  </div>
</div>

<!-- VR FORUM MODAL with avatars -->
<div id="vr-modal" class="hidden fixed inset-0 bg-black z-[200] flex items-center justify-center">
  <div class="relative w-full max-w-5xl h-[90vh] bg-gradient-to-br from-purple-900 to-black rounded-3xl overflow-hidden" id="vr-scene">
    <canvas id="vr-canvas" class="w-full h-full"></canvas>
    <div class="absolute top-6 left-6 text-white text-2xl font-bold">VR Forum – 8 avatars chatting live</div>
    <button onclick="exitVR()" class="absolute top-6 right-6 bg-white text-black px-6 py-3 rounded-2xl">Exit VR</button>
  </div>
</div>

<!-- LIVE TESTER PANEL -->
<div id="dv-tester"> ... (same powerful tester as before – click any element) </div>

  `).join('');

// FLUX SIMULATOR (Phase 1)
function generateWithFlux() {
  const prompt = document.getElementById("flux-prompt").value || "futuristic digital product cover";
  document.getElementById("flux-preview").classList.remove("hidden");
  document.getElementById("flux-preview").src = `https://picsum.photos/id/${Math.floor(Math.random()*1000)}/600/400`;
  alert(`✅ NVIDIA FLUX generated: "${prompt}"\n(Real API call coming in Phase 2)`);
}

// VR with floating avatars
let scene, camera, renderer;
function enterVRForum() {

// All other functions (postGig, tester, etc.)

window.onload = renderAll;
</script>
</body>
</html>
